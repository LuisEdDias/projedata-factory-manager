# Generic Exceptions
exception.validation.failed=A validação falhou para um ou mais campos. Verifique a propriedade "invalid_params" para ver detalhes.
exception.request.malformed_json=Requisição JSON malformada ou tipo de dados inválido fornecido.
exception.internal_error=Ocorreu um erro interno inesperado. Se o problema persistir, entre em contato com o suporte.

