spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/factory_db
    username: factory
    password: factorymanager

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  flyway:
    enabled: true

  messages:
    basename: messages
    encoding: UTF-8
    fallback-to-system-locale: false
    use-code-as-default-message: true

server:
  port: 8080

springdoc:
  cache:
    disabled: true