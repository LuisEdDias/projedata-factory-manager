services:
  postgres:
    image: postgres:16
    container_name: factory-database
    environment:
      POSTGRES_DB: factory_db
      POSTGRES_USER: factory
      POSTGRES_PASSWORD: factorymanager
    ports:
      - "5400:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U factory -d factory_db"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: factory-api
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/factory_db
      SPRING_DATASOURCE_USERNAME: factory
      SPRING_DATASOURCE_PASSWORD: factorymanager
    ports:
      - "8000:8080"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    container_name: factory-frontend
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  pgdata:
